services:
  slipgate:
    build:
      context: ..
      dockerfile: deploy/master-slipgate/Dockerfile
    container_name: thefeed-master
    restart: unless-stopped
    user: root
    env_file:
      - .env
    environment:
      - THEFEED_DOMAIN=${THEFEED_DOMAIN}
      - THEFEED_MASTER_KEY=${THEFEED_MASTER_KEY}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - DB_PATH=/var/lib/thefeed/feed.db
      - CHANNELS_FILE=/app/state/channels.txt
      - X_RSS_FILE=/app/state/x_sources.txt
      - DB_FILE=/var/lib/thefeed/feed.db
      - DNS_PADDING_MIN=${DNS_PADDING_MIN}
      - DNS_PADDING_MAX=${DNS_PADDING_MAX}
    ports:
      - "${SLIPGATE_BIND_IP:-0.0.0.0}:${SLIPGATE_HOST_PORT:-53}:53/udp"
    volumes:
      - ./state:/app/state:ro
      - feeddb_data:/var/lib/thefeed
      - slipgate_keys:/etc/slipgate/keys
    networks:
      - public_net
      - feed_net
    depends_on:
      - rsshub

  authd:
    build:
      context: ..
      dockerfile: deploy/authd/Dockerfile
    container_name: thefeed-authd
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${AUTH_BIND_IP:-0.0.0.0}:${AUTH_HOST_PORT:-8443}:8443/tcp"
    volumes:
      - authd_data:/var/lib/thefeed
      - ./tls:/etc/thefeed/tls:ro
    command:
      - "--listen=:8443"
      - "--tls-cert=/etc/thefeed/tls/fullchain.pem"
      - "--tls-key=/etc/thefeed/tls/privkey.pem"
      - "--db=/var/lib/thefeed/tokens.db"
      - "--token-ttl-days=${TOKEN_TTL_DAYS}"
      - "--rate-limit-rps=${AUTH_RATE_LIMIT_RPS}"
      - "--disable-persistent-logs=true"
    networks:
      - public_net
      - feed_net
      - wordpress_app-network
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  rsshub:
    image: diygod/rsshub
    container_name: rsshub
    restart: unless-stopped
    environment:
      - TWITTER_AUTH_TOKEN=4668ee223bbf9f444700f2bbe2eb3557cd9fa9d2
      - TWITTER_CT0=806383153cff8a1f3e3e86fc41c69d4c50bd1e89093c5de04ce5f578a557df4319f45ae203a2b6dc50c7a32ff7d51c6a82f31cab636101cdc50f6b9468734a9261c230568f973efce80d7b85932548cb
    ports:
      - "1200:1200"
    networks:
      - feed_net
      - public_net

networks:
  feed_net:
    name: feed_net
    driver: bridge
    internal: true
  public_net:
    name: public_net
    driver: bridge
  wordpress_app-network:
    external: true

volumes:
  authd_data:
  feeddb_data:
  slipgate_keys:
