# Slipgate external routing configuration for TheFeed.
# Only route DNS traffic for the delegated tunnel domain.

[listener]
protocol = "udp"
address = "0.0.0.0:53"

[routing]
default_action = "refuse"

[[routing.rules]]
name = "thefeed-tunnel-domain"
match_type = "suffix"
match_value = ".t.example.com"
upstream = "thefeed:5300"
upstream_protocol = "udp"
edns0_passthrough = true
max_response_size = 512

[security]
drop_malformed = true
disable_query_logging = true
